<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced IP Detector</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color: white;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
}

.container {
    width: 100%;
    max-width: 900px;
}

.card {
    background: #1e293b;
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 25px 60px rgba(0,0,0,.5);
    margin-bottom: 30px;
}

h1 {
    margin-top: 0;
    text-align: center;
    font-weight: 600;
}

.ip-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap: 15px;
    margin-top: 25px;
}

.ip-box {
    background: #0f172a;
    padding: 18px;
    border-radius: 14px;
    text-align: center;
    word-break: break-all;
}

.label {
    opacity: .7;
    font-size: 14px;
}

.value {
    margin-top: 8px;
    font-family: monospace;
    font-size: 15px;
}

#map {
    height: 400px;
    border-radius: 20px;
    overflow: hidden;
}

.loading {
    opacity: .6;
    font-style: italic;
}

.leak-warning {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    opacity: .7;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1>🌐 Advanced IP Leak Detection</h1>

        <div class="ip-grid">
            <div class="ip-box">
                <div class="label">IPv4</div>
                <div class="value" id="ipv4">Detecting...</div>
            </div>

            <div class="ip-box">
                <div class="label">IPv6</div>
                <div class="value" id="ipv6">Detecting...</div>
            </div>

            <div class="ip-box">
                <div class="label">Location</div>
                <div class="value" id="location">Detecting...</div>
            </div>
        </div>

        <div class="leak-warning" id="warning"></div>
    </div>

    <div class="card">
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
function isIPv6(ip) {
    return ip && ip.includes(':');
}

async function detectIP() {
    try {
        const ipv4Data = await fetch("https://api.ipify.org?format=json").then(r=>r.json());
        const ipv6Data = await fetch("https://api64.ipify.org?format=json").then(r=>r.json());

        const ipv4 = ipv4Data.ip;
        const ipv6 = isIPv6(ipv6Data.ip) ? ipv6Data.ip : "Not available";

        document.getElementById("ipv4").textContent = ipv4;
        document.getElementById("ipv6").textContent = ipv6;

        // Geolocation lookup
        const geo = await fetch(`https://ipapi.co/${ipv4}/json/`).then(r=>r.json());

        document.getElementById("location").textContent = `${geo.city || ''}, ${geo.country_name || ''}`;

        // Map rendering
        if (geo.latitude && geo.longitude) {
            const map = L.map('map').setView([geo.latitude, geo.longitude], 12);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            L.marker([geo.latitude, geo.longitude]).addTo(map)
                .bindPopup("Approximate IP Location").openPopup();
        }

        // Leak warning heuristic
        if (ipv4 && ipv6 !== "Not available") {
            document.getElementById("warning").textContent =
                "Dual-stack network detected. If using VPN, IP leak may occur.";
        }

    } catch(e) {
        document.getElementById("warning").textContent = "Detection failed.";
    }
}

detectIP();
</script>

</body>
</html>
